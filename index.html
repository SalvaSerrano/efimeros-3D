<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Efímeros 3D - Diseño de Espacio</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
</head>

<body>
    <div id="app">
        <!-- Top Bar -->
        <header class="top-bar">
            <div class="brand">
                <h1>Diseño de Espacios Efímeros y Expositivos</h1>
            </div>
            <div class="top-bar-right">
                <div class="budget-container">
                    <div class="budget-header-row">
                        <div class="budget-label">Presupuesto (máx: <input type="number" id="budget-limit-val"
                                class="editable-limit-input" value="20000" min="0" step="100"> <span id="budget-currency-symbol">€</span>)</div>
                        <select id="currency-select" class="currency-select-inline">
                            <option value="EUR">€ EUR</option>
                            <option value="USD">$ USD</option>
                            <option value="PEN">S/. PEN</option>
                            <option value="COP">$ COP</option>
                            <option value="DOP">RD$ DOP</option>
                            <option value="MXN">$ MXN</option>
                            <option value="ARS">$ ARS</option>
                            <option value="CLP">$ CLP</option>
                        </select>
                    </div>
                    <div id="total-cost" class="budget-value">0 <span id="total-cost-currency-symbol">€</span></div>
                    <div class="progress-wrapper">
                        <div id="budget-progress" class="progress-bar" style="width: 0%;"></div>
                    </div>
                </div>
            </div>
        </header>

        <!-- Left Panel Wrapper (Mode Badge + Toolbar) -->
        <div class="left-panel-wrapper">
            <span id="active-mode" class="mode-badge">Modo: Selección</span>
            <!-- Left Toolbar -->
            <nav class="toolbar-left">
                <button id="btn-select" class="tool-btn active" title="Seleccionar">
                    <span class="icon">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m4 4 7.07 17 2.51-7.38 7.38-2.51L4 4Z"/><path d="m13 13 6 6"/></svg>
                    </span>
                </button>
                <button id="btn-edit" class="tool-btn" title="Editar">
                    <span class="icon">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
                    </span>
                </button>
                <button id="btn-costs" class="tool-btn" title="Editar Costes">
                    <span class="icon">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" x2="12" y1="2" y2="22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                    </span>
                </button>
                <button id="btn-delete" class="tool-btn" title="Borrar">
                    <span class="icon">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
                    </span>
                </button>
                <button id="btn-rotate" class="tool-btn" title="Rotar (R)">
                    <span class="icon">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M16 3h5v5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 21H3v-5"/></svg>
                    </span>
                </button>
                <button id="btn-clear" class="tool-btn" title="Borrar Todo">
                    <span class="icon">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.6-9.6c1-1 2.5-1 3.4 0l5.6 5.6c1 1 1 2.5 0 3.4L13 21Z"/><path d="M22 21H7"/><path d="m5 11 9 9"/></svg>
                    </span>
                </button>
                <button id="btn-screenshot" class="tool-btn" title="Captura de Pantalla">
                    <span class="icon">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>
                    </span>
                </button>
            </nav>
        </div>

        <!-- Sidebar -->
        <aside class="sidebar">
            <h2>Módulos</h2>
            <div id="module-list" class="module-buttons">
                <!-- Modules will be injected here -->
            </div>
            <div class="controls-hint">
                <p>🖱️ Click Der: Orbitar</p>
                <p>⌨️ Shift + Click Der: Pan</p>
                <p>🖱️ Rueda: Zoom</p>
                <p>🖱️ Click Izq: Colocar</p>
            </div>
        </aside>

        <!-- Cost Editor Modal -->
        <dialog id="cost-editor-modal">
            <div class="modal-content">
                <h2>Editar Costes</h2>
                <div id="cost-list" class="cost-list">
                    <!-- Cost inputs will be injected here -->
                </div>
                <div class="modal-actions">
                    <button id="btn-cancel-costs">Cancelar</button>
                    <button id="btn-save-costs" class="primary">Guardar</button>
                </div>
            </div>
        </dialog>

        <!-- Container for Three.js -->
        <div id="three-container"></div>

        <!-- Dimension Sliders Panel -->
        <div class="dimension-panel">
            <h3>Dimensiones</h3>
            <div class="slider-group">
                <label for="slider-x">Ancho: <span id="slider-x-val">30</span> m</label>
                <input type="range" id="slider-x" min="5" max="100" value="30" step="1">
            </div>
            <div class="slider-group">
                <label for="slider-z">Largo: <span id="slider-z-val">60</span> m</label>
                <input type="range" id="slider-z" min="5" max="200" value="60" step="1">
            </div>
        </div>

        <!-- History Panel (Undo / Redo) -->
        <div class="history-panel">
            <button id="btn-undo" title="Deshacer (Ctrl+Z)" disabled>
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/></svg>
            </button>
            <button id="btn-redo" title="Rehacer (Ctrl+Y)" disabled>
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 7v6h-6"/><path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3l3 2.7"/></svg>
            </button>
        </div>
    </div>

    <!-- Three.js Import map -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script type="module" src="main.js"></script>
</body>

</html>
